#cloud-config
update_hostname: narrative-server

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - ufw

runcmd:
  # Install Docker
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Firewall Setup (UFW)
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 8081/tcp
  - ufw allow 8000/tcp
  - ufw allow 8001/tcp
  - ufw allow 8002/tcp
  - ufw allow 8003/tcp
  - ufw --force enable

  # Add ubuntu user to docker group so it can run docker without sudo
  - usermod -aG docker ubuntu

  # Enable Docker
  - systemctl enable docker
  - systemctl start docker

  # Setup project directory
  - mkdir -p /opt/narrative-ai
  - chown ubuntu:ubuntu /opt/narrative-ai

final_message: "Narrative AI server ready after $UPTIME seconds"
